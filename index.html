<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignment 3 - DOM Implementation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f2f5;
    }
    .container {
    text-align: center;
    background: #fff;
    padding: 40px 30px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    width: 90%;
    height: 80vh;
}
    h1 {
      margin-bottom: 25px;
      color: #333;
    }
    .boxes {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 25px;
    }
    .box {
      width: 70px;
      height: 50px;
      border: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
      border-radius: 6px;
      background: #eee;
      transition: 0.3s;
    }
    input {
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 12px;
    }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: white;
      cursor: pointer;
    }
    button:hover { background: #555; }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="greeting">Hello</h1>

    <div class="boxes">
      <div class="box" id="redBox">Red</div>
      <div class="box" id="blueBox">Blue</div>
      <div class="box" id="greenBox">Green</div>
      <div class="box" id="yellowBox">Yellow</div>
    </div>

     <div class="form" style="width: 60%; margin: auto;">
        <input type="text" id="username" placeholder="Enter your name" />
    
        <button id="greetBtn">Greet</button>
     </div>
  </div>

  <!-- Inner JS DOM -->
  <script>
    const greeting = document.getElementById("greeting");
    const nameInput = document.getElementById("username");
    const greetBtn = document.getElementById("greetBtn");

    const redBox = document.getElementById("redBox");
    const blueBox = document.getElementById("blueBox");
    const greenBox = document.getElementById("greenBox");
    const yellowBox = document.getElementById("yellowBox");

    greetBtn.addEventListener("click", function () {
      const name = nameInput.value.trim();
      if (name === "") {
        alert("Please enter your name");
        return;
      }
      greeting.textContent = "Hello, " + name;
    });

    redBox.addEventListener("click", function () {
      redBox.style.backgroundColor = "red";
      redBox.style.color = "white";
    });

    blueBox.addEventListener("click", function () {
      blueBox.style.backgroundColor = "blue";
      blueBox.style.color = "white";
    });

    greenBox.addEventListener("click", function () {
      greenBox.style.backgroundColor = "green";
      greenBox.style.color = "white";
    });

    yellowBox.addEventListener("click", function () {
      yellowBox.style.backgroundColor = "yellow";
      yellowBox.style.color = "black";
    });
  </script>
</body>
</html>
